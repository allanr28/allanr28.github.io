<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/Reset.css">
    <link rel="stylesheet" href="styles/dist/Style.css">
    <title>Todo App</title>
</head>
<body>
    
    <div id="main-container">
        <div class="container-80">
            <h3>ToDo App</h3>
            <div id="todo-input">
                <input type="text" name="" id="task-input" placeholder="Enter your task here...">
                <button id="submit">Add</button>
            </div>
            <div id="filters">
                <i class="fa-regular fa-circle-check" id = "complete-filter"></i>
                <i class="fa-solid fa-arrow-down-a-z" id = "alphabetical-filter"></i>
            </div>
            <div id="task-container">
              
                <!-- <div class="task">
                    <p>This is the task text</p>
                    <div class="complete-task"> <i class="fa-regular fa-circle"></i> </div>
                    <div class="delete-task"> <i class="fa-solid fa-trash"></i> </div>
                </div>        -->
            </div>
        </div>
    </div>

    <script src="https://kit.fontawesome.com/c8a4281609.js" crossorigin="anonymous"></script>
    <script src="scripts/App.js"></script>
</body>
</html>
